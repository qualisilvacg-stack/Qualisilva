<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Qualisilva</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Georgia,serif;background:#f5f2ec;color:#1a1a16;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:Georgia,serif}
.app{max-width:600px;margin:0 auto;min-height:100vh}

/* LOGIN */
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;gap:24px;text-align:center;background:#f5f2ec}
.login-logo{font-size:72px;line-height:1}
.login-title{font-size:26px;font-weight:bold;letter-spacing:3px;color:#1c2e1c}
.login-sub{font-size:14px;color:#666;line-height:1.7;max-width:300px}
.btn-google{display:flex;align-items:center;gap:12px;background:#fff;border:2px solid #ddd;border-radius:12px;padding:15px 24px;font-size:15px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);color:#333}
.login-note{font-size:11px;color:#aaa;max-width:260px;line-height:1.6}

/* HEADER */
.hdr{background:#1c2e1c;color:#e8e4d8;padding:12px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.4)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo{font-size:17px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-ok{background:#5fb87a}.dot-save{background:#f0c040;animation:blink 1s infinite}.dot-err{background:#e07070}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.btn-saisir{background:#4a7c59;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:bold;cursor:pointer}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);background:#162316;border-radius:8px;overflow:hidden}
.kpi{padding:7px 4px;text-align:center;border-right:1px solid #1c2e1c}
.kpi:last-child{border-right:none}
.kpi-l{font-size:8px;color:#6a9a6a;letter-spacing:.5px;text-transform:uppercase}
.kpi-v{font-size:11px;font-weight:bold;margin-top:2px}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:#1c2e1c;display:flex;z-index:50;border-top:2px solid #2d5a27}
.nav-b{flex:1;padding:10px 4px 8px;background:transparent;border:none;cursor:pointer;font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:#7aaa7a;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-b.on{background:#2d5a27;color:#e8f4e8}
.nav-ico{font-size:19px;line-height:1}

/* MAIN */
.main{padding:14px;padding-bottom:80px}
.hidden{display:none!important}

/* CARDS */
.card{background:#fff;border-radius:12px;border:1px solid #ddd6c8;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:10px}
.card-hdr{padding:12px 16px;border-bottom:2px solid #4a7c59}
.card-hdr h3{font-size:15px;color:#1c2e1c}
.card-body{padding:14px 16px}

/* FILTRES */
.fscroll{overflow-x:auto;white-space:nowrap;margin-bottom:10px;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.fbtn{display:inline-block;margin-right:6px;padding:6px 12px;border-radius:20px;border:none;background:#ddd8cc;color:#444;cursor:pointer;font-size:12px;font-family:Georgia,serif}
.fbtn.on{color:#fff;font-weight:bold}

/* ENTRÉES */
.entry{display:flex;background:#fff;border-radius:12px;border:1px solid #ddd6c8;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:8px}
.e-band{width:6px;flex-shrink:0}
.e-body{flex:1;padding:11px 13px;min-width:0}
.e-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
.e-date{font-weight:bold;font-size:14px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;color:#fff;white-space:nowrap}
.badge-dos{font-size:10px;padding:2px 8px;border-radius:10px;background:#f0e8d0;color:#5a4010}
.e-desc{font-size:14px;margin-bottom:5px;line-height:1.4;word-break:break-word}
.e-dep{font-size:12px;color:#c0392b;line-height:1.5;margin-bottom:2px}
.e-rec{font-size:12px;color:#27ae60;line-height:1.5}
.e-rem{font-size:12px;color:#999;font-style:italic;margin-top:3px}
.e-acts{display:flex;flex-direction:column;gap:5px;margin-left:8px;flex-shrink:0;padding:8px 8px 8px 0}
.be,.bd{border:none;border-radius:6px;padding:7px 9px;cursor:pointer;font-size:13px}
.be{background:#f0e8d0}.bd{background:#fde8e8}

/* FORMULAIRE */
.form-wrap{background:#fff;border-radius:12px;border:1px solid #ddd6c8;padding:16px}
.form-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:2px solid #4a7c59;padding-bottom:10px}
.form-hdr h3{font-size:16px;color:#1c2e1c}
.btn-close{background:none;border:none;font-size:28px;cursor:pointer;color:#aaa;line-height:1;padding:0 4px}
.fg{margin-bottom:13px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:13px}
.lbl{display:block;font-size:10px;font-weight:bold;color:#5a4a2a;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.lbl-r{color:#c0392b}.lbl-g{color:#27ae60}
.inp{width:100%;border:1px solid #ccc8be;border-radius:8px;padding:12px 13px;font-size:16px;font-family:Georgia,serif;background:#faf8f4;-webkit-appearance:none;appearance:none;color:#1a1a16}
textarea.inp{resize:none}

/* TAG PICKER */
.tag-picker{display:flex;flex-wrap:wrap;gap:7px}
.tp{padding:9px 13px;border-radius:20px;border:2px solid transparent;background:#eee;color:#444;cursor:pointer;font-size:13px;font-family:Georgia,serif}
.tp.on{color:#fff;font-weight:bold}

/* DEPLACEMENT */
.dep-blk{border:1px solid #c8dfc8;border-radius:10px;overflow:hidden;margin-bottom:13px}
.dep-tog{background:#f0f5f0;padding:12px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;min-height:48px}
.dep-tog.open{background:#d8f0d8}
.dep-tog-lbl{font-weight:bold;font-size:14px;color:#2d5a27}
.dep-ico{font-size:22px;color:#2d5a27}
.dep-inner{padding:13px 15px;background:#f8fff8;display:flex;flex-direction:column;gap:11px}
.dep-prev{background:#d0edce;border-radius:7px;padding:9px 13px;font-size:13px;color:#1a3f1a}
.dep-check{display:flex;align-items:center;gap:10px;font-size:15px;cursor:pointer}
.dep-check input{width:20px;height:20px}

/* LIGNES */
.ll{display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.li{display:flex;align-items:center;gap:8px;border-radius:6px;padding:8px 10px}
.li-d{background:#fff5f5}.li-r{background:#f2fff5}
.li-lbl{flex:1;font-size:13px}
.li-amt{font-size:13px;font-weight:bold}
.li-rm{background:none;border:none;cursor:pointer;font-size:22px;padding:0 4px;line-height:1;color:#aaa}
.la{display:flex;gap:7px}
.btn-ad{background:#c0392b;color:#fff;border:none;border-radius:8px;padding:0 13px;font-size:24px;cursor:pointer;flex-shrink:0;min-height:48px;line-height:1}
.btn-ar{background:#27ae60;color:#fff;border:none;border-radius:8px;padding:0 13px;font-size:24px;cursor:pointer;flex-shrink:0;min-height:48px;line-height:1}
.btn-save{background:#4a7c59;color:#fff;border:none;border-radius:8px;padding:15px;font-size:16px;font-weight:bold;cursor:pointer;width:100%;font-family:Georgia,serif;margin-top:4px}

/* ANALYSES */
.bar-row{margin-bottom:11px}
.bar-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
.bar-track{background:#eee9e0;border-radius:4px;height:8px}
.bar-fill{height:8px;border-radius:4px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:7px 8px;background:#f5f0e6;color:#5a4a2a;font-size:10px;letter-spacing:.5px;text-transform:uppercase}
.tbl td{padding:7px 8px;border-top:1px solid #eee}
.nf-row{display:flex;gap:10px;margin-bottom:13px}
.nf-box{flex:1;text-align:center;border-radius:8px;padding:11px 6px}

/* TAGS EDITOR */
.te-item{background:#faf8f4;border:1px solid #ddd;border-radius:8px;padding:10px 11px;margin-bottom:9px}
.te-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.te-dot{width:26px;height:26px;border-radius:50%;border:2px solid rgba(0,0,0,.1);flex-shrink:0}
.te-name{flex:1;font-size:14px;font-weight:bold;color:#1c2e1c}
.te-cnt{font-size:11px;color:#aaa}
.te-inp{flex:1;border:1px solid #ccc;border-radius:7px;padding:8px 10px;font-size:14px;font-family:Georgia,serif;background:#faf8f4}
.btn-ok{background:#4a7c59;color:#fff;border:none;border-radius:6px;padding:8px 13px;cursor:pointer;font-family:Georgia,serif;font-size:13px}
.btn-can{background:#eee;border:none;border-radius:6px;padding:8px 9px;cursor:pointer;font-family:Georgia,serif;font-size:13px}
.btn-te{background:#f0e8d0;border:none;border-radius:6px;padding:6px 9px;cursor:pointer;font-size:13px}
.btn-td{background:#fde8e8;border:none;border-radius:6px;padding:6px 9px;cursor:pointer;font-size:13px}
.palette{display:flex;gap:7px;flex-wrap:wrap}
.pal-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.pal-dot.on{border-color:#1a1a16}
.btn-addtag{background:#7a5c8a;color:#fff;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:bold;cursor:pointer;width:100%;font-family:Georgia,serif}

.empty{text-align:center;color:#aaa;padding:36px;font-size:14px}
.sep{height:1px;background:#eee;margin:4px 0}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Rendu dynamique -->
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const CLIENT_ID = "967084691763-oo1vium2msv1svm44ap0n0pdejg3n07b.apps.googleusercontent.com";
const SCOPES    = "https://www.googleapis.com/auth/drive.appdata";
const FILE_NAME = "qualisilva-data.json";
const TAUX_KM   = 0.5;
const ADRESSE   = "11 rue de Mayenne, Sarthe";
const PALETTE   = ["#2d5a27","#4a7c59","#6b8f71","#8b6914","#5c7a8a","#7a5c8a","#b05030","#2a6080","#888","#3a3a6a"];

// ═══════════════════════════════════════════════════
// ÉTAT GLOBAL
// ═══════════════════════════════════════════════════
let S = {
  screen:   "login",   // login | app
  view:     "journal", // journal | saisie | analyse | tags
  entries:  [],
  tags:     [
    {label:"Prospection",color:"#4a7c59"},
    {label:"Martelage",color:"#2d5a27"},
    {label:"Analyse/Rédaction",color:"#6b8f71"},
    {label:"Formation/Veille",color:"#8b6914"},
    {label:"Admin",color:"#7a5c8a"},
  ],
  filterTag: "Tous",
  filterDos: "Tous",
  editId:    null,
  form:      null,
  showDep:   false,
  newDep:    {libelle:"",montant:""},
  newRec:    {libelle:"",montant:""},
  newTagLbl: "",
  newTagCol: "#4a7c59",
  editTagI:  null,
  editTagV:  "",
  syncStatus:"ok",
  token:     null,
  fileId:    null,
};

const SEED = [
  {id:1,date:"2025-03-19",description:"Rencontre client à Brissac-Quinié",tag:"Prospection",dossier:"Brissac",heures:8,deplacement:{adresseDepart:ADRESSE,adresseArrivee:"Brissac-Quinié, Maine-et-Loire",km:84,peage:8,allerRetour:true},depenses:[],recettes:[],remarque:"Premier contact, visite non facturée"},
  {id:2,date:"2025-04-01",description:"Lecture PSG + préparation visite forêt Brissac",tag:"Analyse/Rédaction",dossier:"Brissac",heures:2.5,deplacement:null,depenses:[],recettes:[],remarque:"2h30 de préparation"},
  {id:3,date:"2025-04-02",description:"Visite forêt de Brissac",tag:"Martelage",dossier:"Brissac",heures:8,deplacement:{adresseDepart:ADRESSE,adresseArrivee:"Brissac-Quinié, Maine-et-Loire",km:84,peage:8,allerRetour:true},depenses:[],recettes:[],remarque:"Journée offerte au client"},
  {id:4,date:"2025-04-06",description:"Travail dossier Brissac — contrat + analyse parcelles",tag:"Analyse/Rédaction",dossier:"Brissac",heures:8,deplacement:null,depenses:[{libelle:"Journée de travail (coût interne)",montant:550}],recettes:[],remarque:"Journée bureau"},
  {id:5,date:"2025-04-07",description:"Martelage forêt de Brissac",tag:"Martelage",dossier:"Brissac",heures:8,deplacement:{adresseDepart:ADRESSE,adresseArrivee:"Brissac-Quinié, Maine-et-Loire",km:84,peage:8,allerRetour:true},depenses:[],recettes:[{libelle:"Journée de martelage",montant:550},{libelle:"Remboursement km",montant:42},{libelle:"Remboursement péage",montant:8}],remarque:""},
  {id:6,date:"2025-04-09",description:"Forêt d'Écouves — rencontre spécialistes",tag:"Formation/Veille",dossier:"Veille",heures:8,deplacement:{adresseDepart:ADRESSE,adresseArrivee:"Forêt d'Écouves, Orne",km:130,peage:0,allerRetour:true},depenses:[],recettes:[],remarque:"Formation/réseau, non facturé"},
  {id:7,date:"2025-04-13",description:"Analyse données martelage + rédaction CR + cubage",tag:"Analyse/Rédaction",dossier:"Brissac",heures:6,deplacement:null,depenses:[{libelle:"6h travail (6/8×550€)",montant:412.5}],recettes:[],remarque:""},
  {id:8,date:"2025-04-14",description:"Martelage forêt de Brissac",tag:"Martelage",dossier:"Brissac",heures:8,deplacement:{adresseDepart:ADRESSE,adresseArrivee:"Brissac-Quinié, Maine-et-Loire",km:84,peage:8,allerRetour:true},depenses:[],recettes:[{libelle:"Journée de martelage",montant:550},{libelle:"Remboursement km",montant:42},{libelle:"Remboursement péage",montant:8}],remarque:""},
];

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
const calcKm    = d => d ? (d.km||0)*TAUX_KM : 0;
const calcPeage = d => d ? (d.peage||0) : 0;
const totDep    = e => e.depenses.reduce((s,d)=>s+d.montant,0)+calcKm(e.deplacement)+calcPeage(e.deplacement);
const totRec    = e => e.recettes.reduce((s,r)=>s+r.montant,0);
const fmt  = n  => Number(n).toFixed(2).replace(".",",")+"\u00a0€";
const fmtD = d  => { const [y,m,day]=d.split("-"); return `${day}/${m}/${y}`; };
const tagCol = lbl => (S.tags.find(t=>t.label===lbl)||{color:"#888"}).color;
const dossiers = () => [...new Set(S.entries.map(e=>e.dossier).filter(Boolean))];

// ═══════════════════════════════════════════════════
// GOOGLE DRIVE
// ═══════════════════════════════════════════════════
let saveTimer = null;

function scheduleSave() {
  setSyncStatus("pending");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 2000);
}

async function doSave() {
  if (!S.token || !S.fileId) return;
  try {
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${S.fileId}?uploadType=media`, {
      method:"PATCH",
      headers:{Authorization:"Bearer "+S.token,"Content-Type":"application/json"},
      body:JSON.stringify({entries:S.entries,tags:S.tags})
    });
    setSyncStatus("ok");
  } catch(e) { setSyncStatus("err"); }
}

function setSyncStatus(s) {
  S.syncStatus = s;
  const d = document.getElementById("sync-dot");
  if (d) { d.className="dot dot-"+s; d.title={ok:"Synchronisé",pending:"Sauvegarde…",err:"Erreur"}[s]||""; }
}

async function signIn() {
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: location.origin+location.pathname,
    response_type: "token",
    scope: SCOPES,
    prompt: "select_account"
  });
  const popup = window.open("https://accounts.google.com/o/oauth2/v2/auth?"+params,"_blank","width=520,height=620");
  return new Promise((res,rej) => {
    const t = setInterval(()=>{
      try {
        if (!popup||popup.closed){clearInterval(t);rej(new Error("fermé"));return;}
        const u = popup.location.href;
        if (u.includes("access_token")) {
          clearInterval(t); popup.close();
          const h = new URLSearchParams(u.split("#")[1]);
          res(h.get("access_token"));
        }
      } catch(e){}
    },400);
  });
}

async function driveLoad(token) {
  // Cherche le fichier
  const r = await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27qualisilva-data.json%27&fields=files(id)",
    {headers:{Authorization:"Bearer "+token}});
  const j = await r.json();
  if (j.files && j.files.length > 0) {
    S.fileId = j.files[0].id;
    const r2 = await fetch("https://www.googleapis.com/drive/v3/files/"+S.fileId+"?alt=media",
      {headers:{Authorization:"Bearer "+token}});
    return await r2.json();
  } else {
    // Crée le fichier
    const data = {entries:SEED, tags:S.tags};
    const meta = JSON.stringify({name:FILE_NAME,parents:["appDataFolder"]});
    const body = JSON.stringify(data);
    const form = new FormData();
    form.append("metadata", new Blob([meta],{type:"application/json"}));
    form.append("file", new Blob([body],{type:"application/json"}));
    const r2 = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",
      {method:"POST",headers:{Authorization:"Bearer "+token},body:form});
    const j2 = await r2.json();
    S.fileId = j2.id;
    return data;
  }
}

// ═══════════════════════════════════════════════════
// RENDU
// ═══════════════════════════════════════════════════
function render() {
  document.getElementById("app").innerHTML = S.screen==="login" ? renderLogin() : renderApp();
  bindEvents();
}

function renderLogin() {
  return `
  <div class="login">
    <div class="login-logo">🌲</div>
    <div class="login-title">QUALISILVA</div>
    <div class="login-sub">Suivi d'activité sylvicole synchronisé sur votre Google Drive.</div>
    <button class="btn-google" id="btn-signin">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Se connecter avec Google
    </button>
    <div class="login-note">Qualisilva accède uniquement au dossier privé "appData" de votre Drive.</div>
  </div>`;
}

function renderApp() {
  const stats = calcStats();
  return `
  <div class="hdr">
    <div class="hdr-top">
      <div class="logo">🌲 QUALISILVA <span class="dot dot-${S.syncStatus}" id="sync-dot"></span></div>
      <button class="btn-saisir" id="btn-new">+ Saisir</button>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="kpi-l">Recettes</div><div class="kpi-v" style="color:#5fb87a">${fmt(stats.tr)}</div></div>
      <div class="kpi"><div class="kpi-l">Dépenses</div><div class="kpi-v" style="color:#e07070">${fmt(stats.td)}</div></div>
      <div class="kpi"><div class="kpi-l">Solde</div><div class="kpi-v" style="color:${stats.solde>=0?"#5fb87a":"#e07070"}">${fmt(stats.solde)}</div></div>
      <div class="kpi"><div class="kpi-l">TJM</div><div class="kpi-v" style="color:#c8b46a">${stats.th>0?fmt(stats.tjm).replace("\u00a0€","")+"\u00a0€/j":"—"}</div></div>
    </div>
  </div>
  <div class="main">
    ${S.view==="journal"  ? renderJournal(stats)  : ""}
    ${S.view==="saisie"   ? renderSaisie()         : ""}
    ${S.view==="analyse"  ? renderAnalyse(stats)   : ""}
    ${S.view==="tags"     ? renderTags(stats)       : ""}
  </div>

function renderJournal(stats) {
  const filtered = S.entries
    .filter(e=>S.filterTag==="Tous"||e.tag===S.filterTag)
    .filter(e=>S.filterDos==="Tous"||e.dossier===S.filterDos)
    .sort((a,b)=>b.date.localeCompare(a.date));
  const dos = dossiers();
  return `
  <div class="fscroll">
    ${["Tous",...S.tags.map(t=>t.label)].map(t=>`
      <button class="fbtn ${S.filterTag===t?"on":""}" style="${S.filterTag===t?"background:"+( t==="Tous"?"#4a7c59":tagCol(t))+";":""}" data-ftag="${t}">${t}</button>

    `).join("")}
  </div>`:""}
  ${filtered.length===0?`<div class="empty">Aucune entrée</div>`:""}
  ${filtered.map(entry=>{
    const km=calcKm(entry.deplacement),pe=calcPeage(entry.deplacement);
    const tR=totRec(entry),tD=totDep(entry);
    const col=tagCol(entry.tag);
    return `

              <span class="e-date">${fmtD(entry.date)}</span>
              <span class="badge" style="background:${col}">${entry.tag}</span>
              ${entry.dossier?`<span class="badge-dos">${entry.dossier}</span>`:""}
              <span style="font-size:11px;color:#999">${entry.heures}h</span>
            </div>
            <div class="e-desc">${entry.description}</div>
            ${tD>0?`<div class="e-dep">📤 ${[
              ...entry.depenses.map(d=>`${d.libelle} (${fmt(d.montant)})`),
              km>0?`Km A/R ${entry.deplacement.km} km (${fmt(km)})`:"",
              pe>0?`Péage (${fmt(pe)})`:"",
            ].filter(Boolean).join(" · ")} <strong>= ${fmt(tD)}</strong></div>`:""}
            ${tR>0?`<div class="e-rec">📥 ${entry.recettes.map(r=>`${r.libelle} (${fmt(r.montant)})`).join(" · ")} <strong>= ${fmt(tR)}</strong></div>`:""}
            ${entry.remarque?`<div class="e-rem">💬 ${entry.remarque}</div>`:""}
          </div>
          <div class="e-acts">

            <button class="bd" data-del="${entry.id}">🗑</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join("")}`;
}

  return `
  <div class="card">
    <div class="card-hdr"><h3>Répartition par activité</h3></div>
    <div class="card-body">
      ${S.tags.filter(t=>stats.parTag[t.label]?.nb>0).map(t=>{
        const d=stats.parTag[t.label];
        return `<div class="bar-row">
          <div class="bar-top"><span style="font-weight:bold;color:${t.color}">${t.label}</span><span style="font-size:11px;color:#888">${d.h}h · ${fmt(d.r)}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.h/barMax*100)}%;background:${t.color}"></div></div>

      }).join("")}

  </div>
  <div class="card">
    <div class="card-hdr" style="border-color:#8b6914"><h3>Rentabilité par dossier</h3></div>

      <table class="tbl">
        <thead><tr>${["Dossier","h","Rec.","Dép.","Solde","TJM"].map((c,i)=>`<th style="text-align:${i===0?"left":"right"}">${c}</th>`).join("")}</tr></thead>
        <tbody>
          ${Object.entries(parDos).map(([d,s])=>{
            const sol=s.r-s.d,tjm=s.h>0?s.r/(s.h/8):0;

              <td style="font-weight:bold">${d}</td>
              <td style="text-align:right">${s.h}</td>

              <td style="text-align:right;color:#c0392b">${fmt(s.d)}</td>
              <td style="text-align:right;font-weight:bold;color:${sol>=0?"#27ae60":"#c0392b"}">${fmt(sol)}</td>

      </table>

  <div class="card">
    <div class="card-hdr" style="border-color:#5c7a8a"><h3>Temps non facturé</h3></div>
    <div class="card-body">
      <div class="nf-row">
        <div class="nf-box" style="background:#f0eeee"><div style="font-size:24px;font-weight:bold;color:#5c7a8a">${hNF}h</div><div style="font-size:10px;color:#888;margin-top:2px">non facturées</div></div>

      </div>
      ${nf.map(e=>`<div style="font-size:12px;padding:4px 0;border-bottom:1px solid #eee;color:#555">${fmtD(e.date)} — ${e.description} <span style="color:#aaa">(${e.heures}h)</span></div>`).join("")}

  </div>`;
}

function calcStats() {
  const th=S.entries.reduce((s,e)=>s+e.heures,0);
  const td=S.entries.reduce((s,e)=>s+totDep(e),0);
  const tr=S.entries.reduce((s,e)=>s+totRec(e),0);
  const parTag={};
  S.tags.forEach(t=>{
    const es=S.entries.filter(e=>e.tag===t.label);
    parTag[t.label]={h:es.reduce((s,e)=>s+e.heures,0),d:es.reduce((s,e)=>s+totDep(e),0),r:es.reduce((s,e)=>s+totRec(e),0),nb:es.length};
  });
  const parDos={};
  [...new Set(S.entries.map(e=>e.dossier||"—"))].forEach(d=>{
    const es=S.entries.filter(e=>(e.dossier||"—")===d);
    parDos[d]={h:es.reduce((s,e)=>s+e.heures,0),r:es.reduce((s,e)=>s+totRec(e),0),d:es.reduce((s,e)=>s+totDep(e),0)};
  });
  return {th,td,tr,solde:tr-td,tjm:th>0?tr/(th/8):0,parTag,parDos};
}

// ═══════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════
function bindEvents() {
  // Login
  const btnSignin = document.getElementById("btn-signin");
  if (btnSignin) btnSignin.onclick = async () => {
    try {
      const token = await signIn();
      S.token = token;
      const data = await driveLoad(token);
      S.entries = data.entries||SEED;
      S.tags    = data.tags||S.tags;
      S.screen  = "app";
      render();
    } catch(e) { alert("Connexion annulée ou erreur : "+e.message); }
  };

  // Nav
  document.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>{
    S.view=b.dataset.view; render();
  });

  // Nouveau
  const btnNew = document.getElementById("btn-new");
  if (btnNew) btnNew.onclick = () => {
    S.form={date:new Date().toISOString().slice(0,10),description:"",tag:S.tags[0]?.label||"",dossier:"",heures:8,deplacement:null,depenses:[],recettes:[],remarque:""};
    S.showDep=false; S.editId=null; S.newDep={libelle:"",montant:""}; S.newRec={libelle:"",montant:""};
    S.view="saisie"; render();
  };

  // Filtres
  document.querySelectorAll("[data-ftag]").forEach(b=>b.onclick=()=>{S.filterTag=b.dataset.ftag;render();});
  document.querySelectorAll("[data-fdos]").forEach(b=>b.onclick=()=>{S.filterDos=b.dataset.fdos;render();});

  // Edit / Delete entrée
  document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{
    const e=S.entries.find(e=>e.id==b.dataset.edit);
    if(!e)return;
    S.form={...e}; S.showDep=!!e.deplacement; S.editId=e.id;
    S.newDep={libelle:"",montant:""}; S.newRec={libelle:"",montant:""};
    S.view="saisie"; render();
  });
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    if(!confirm("Supprimer cette entrée ?"))return;
    S.entries=S.entries.filter(e=>e.id!=b.dataset.del);
    scheduleSave(); render();
  });

  // Formulaire saisie
  if (S.view==="saisie") {
    // Cancel
    const btnCan = document.getElementById("btn-cancel");
    if(btnCan) btnCan.onclick=()=>{S.view="journal";render();};

    // Tag picker
    document.querySelectorAll("[data-tag]").forEach(b=>b.onclick=()=>{S.form.tag=b.dataset.tag;render();});

    // Déplacement toggle
    const depTog=document.getElementById("dep-toggle");
    if(depTog) depTog.onclick=()=>{
      saveFormFields();
      S.showDep=!S.showDep;
      if(S.showDep&&!S.form.deplacement) S.form.deplacement={adresseDepart:ADRESSE,adresseArrivee:"",km:"",peage:"",allerRetour:true};
      if(!S.showDep) S.form.deplacement=null;
      render();
    };

    // Champs déplacement live
    ["f-dep-from","f-dep-to","f-km","f-peage"].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.oninput=()=>{ saveFormFields(); render(); };
    });
    const arEl=document.getElementById("f-ar");
    if(arEl) arEl.onchange=()=>{ saveFormFields(); render(); };

    // Dépenses
    document.querySelectorAll("[data-rmdep]").forEach(b=>b.onclick=()=>{
      S.form.depenses=S.form.depenses.filter((_,i)=>i!=b.dataset.rmdep); render();
    });
    const btnAD=document.getElementById("btn-adddep");
    if(btnAD) btnAD.onclick=()=>{
      const lbl=document.getElementById("nd-lbl").value.trim();
      const amt=parseFloat(document.getElementById("nd-amt").value);
      if(!lbl||!amt)return;
      S.form.depenses.push({libelle:lbl,montant:amt});
      S.newDep={libelle:"",montant:""}; render();
    };

    // Recettes
    document.querySelectorAll("[data-rmrec]").forEach(b=>b.onclick=()=>{
      S.form.recettes=S.form.recettes.filter((_,i)=>i!=b.dataset.rmrec); render();
    });
    const btnAR=document.getElementById("btn-addrec");
    if(btnAR) btnAR.onclick=()=>{
      const lbl=document.getElementById("nr-lbl").value.trim();
      const amt=parseFloat(document.getElementById("nr-amt").value);
      if(!lbl||!amt)return;
      S.form.recettes.push({libelle:lbl,montant:amt});
      S.newRec={libelle:"",montant:""}; render();
    };

    // Save
    const btnSave=document.getElementById("btn-save");
    if(btnSave) btnSave.onclick=()=>{
      saveFormFields();
      const f=S.form;
      if(!f.description.trim()){alert("Ajoute une description.");return;}
      if(S.showDep&&f.deplacement){
        f.deplacement.km=parseFloat(f.deplacement.km)||0;
        f.deplacement.peage=parseFloat(f.deplacement.peage)||0;
      }
      if(S.editId) S.entries=S.entries.map(e=>e.id===S.editId?{...f,id:S.editId}:e);
      else S.entries.push({...f,id:Date.now()});
      scheduleSave(); S.view="journal"; S.editId=null; render();
    };
  }

  // Tags editor
  document.querySelectorAll("[data-editte]").forEach(b=>b.onclick=()=>{
    S.editTagI=parseInt(b.dataset.editte); S.editTagV=S.tags[S.editTagI].label; render();
    setTimeout(()=>document.getElementById("te-inp")?.focus(),50);
  });
  document.querySelectorAll("[data-savete]").forEach(b=>b.onclick=()=>{
    const idx=parseInt(b.dataset.savete);
    const nl=(document.getElementById("te-inp")?.value||"").trim();
    if(!nl)return;
    const ol=S.tags[idx].label;
    S.tags[idx].label=nl;
    S.entries=S.entries.map(e=>e.tag===ol?{...e,tag:nl}:e);
    S.editTagI=null; scheduleSave(); render();
  });
  const btnCanTE=document.getElementById("btn-cante");
  if(btnCanTE) btnCanTE.onclick=()=>{S.editTagI=null;render();};
  document.querySelectorAll("[data-delte]").forEach(b=>b.onclick=()=>{
    const idx=parseInt(b.dataset.delte);
    const lbl=S.tags[idx].label;
    if(S.entries.some(e=>e.tag===lbl)&&!confirm(`Le tag "${lbl}" est utilisé. Supprimer quand même ?`))return;
    S.tags=S.tags.filter((_,i)=>i!==idx); scheduleSave(); render();
  });
  document.querySelectorAll("[data-setcol]").forEach(d=>d.onclick=()=>{
    S.tags[parseInt(d.dataset.setcol)].color=d.dataset.col; scheduleSave(); render();
  });
  document.querySelectorAll("[data-newcol]").forEach(d=>d.onclick=()=>{
    S.newTagCol=d.dataset.newcol; render();
  });
  const ntLbl=document.getElementById("nt-lbl");
  if(ntLbl) ntLbl.oninput=e=>{S.newTagLbl=e.target.value;render();};
  const btnAddTag=document.getElementById("btn-addtag");
  if(btnAddTag) btnAddTag.onclick=()=>{
    const l=(document.getElementById("nt-lbl")?.value||"").trim();
    if(!l||S.tags.find(t=>t.label===l))return;
    S.tags.push({label:l,color:S.newTagCol});
    S.newTagLbl=""; scheduleSave(); render();
  };
}

function saveFormFields() {
  if(!S.form)return;
  const g=id=>document.getElementById(id);
  if(g("f-date"))    S.form.date=g("f-date").value;
  if(g("f-heures"))  S.form.heures=parseFloat(g("f-heures").value)||0;
  if(g("f-desc"))    S.form.description=g("f-desc").value;
  if(g("f-dos"))     S.form.dossier=g("f-dos").value;
  if(g("f-rem"))     S.form.remarque=g("f-rem").value;
  if(S.showDep&&S.form.deplacement){
    if(g("f-dep-from")) S.form.deplacement.adresseDepart=g("f-dep-from").value;
    if(g("f-dep-to"))   S.form.deplacement.adresseArrivee=g("f-dep-to").value;
    if(g("f-km"))       S.form.deplacement.km=g("f-km").value;
    if(g("f-peage"))    S.form.deplacement.peage=g("f-peage").value;
    if(g("f-ar"))       S.form.deplacement.allerRetour=g("f-ar").checked;
  }
  if(g("nd-lbl")) S.newDep.libelle=g("nd-lbl").value;
  if(g("nd-amt")) S.newDep.montant=g("nd-amt").value;
  if(g("nr-lbl")) S.newRec.libelle=g("nr-lbl").value;
  if(g("nr-amt")) S.newRec.montant=g("nr-amt").value;
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
render();
</script>
</body>
</html>
