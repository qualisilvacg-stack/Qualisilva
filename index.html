<script>

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const calcKm    = d => d ? (parseFloat(d.km)||0) * TAUX_KM : 0;
const calcPeage = d => d ? (parseFloat(d.peage)||0) : 0;
const totDep    = e => e.depenses.reduce((s,d)=>s+d.montant,0) + calcKm(e.deplacement) + calcPeage(e.deplacement);
const totRec    = e => e.recettes.reduce((s,r)=>s+r.montant,0);
const fmt  = n  => Number(n).toFixed(2).replace(".",",")+"\u00a0€";
const fmtD = d  => { const [y,m,day]=d.split("-"); return `${day}/${m}/${y}`; };
const tagCol = lbl => (S.tags.find(t=>t.label===lbl)||{color:"#888"}).color;
const dossiers = () => [...new Set(S.entries.map(e=>e.dossier).filter(Boolean))];
let toastTimer;
const toast = msg => {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2500);
};

// ═══════════════════════════════════════════
// GOOGLE DRIVE
// ═══════════════════════════════════════════
let saveTimer=null;
function scheduleSave(){
  setSyncDot("pending");
  clearTimeout(saveTimer);
  saveTimer=setTimeout(doSave,2000);
}
async function doSave(){
  if(!S.token||!S.fileId)return;
  try{
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${S.fileId}?uploadType=media`,{
      method:"PATCH",
      headers:{Authorization:"Bearer "+S.token,"Content-Type":"application/json"},
      body:JSON.stringify({entries:S.entries,tags:S.tags})
    });
    setSyncDot("ok"); toast("✓ Sauvegardé");
  }catch(e){setSyncDot("err"); toast("⚠ Erreur de sauvegarde");}
}
function setSyncDot(s){
  S.syncStatus=s;
  const d=document.getElementById("sync-dot");
  if(d){d.className="dot dot-"+s; d.title={ok:"Synchronisé",pending:"Sauvegarde…",err:"Erreur"}[s]||"";}
}
async function signIn(){
  const params=new URLSearchParams({client_id:CLIENT_ID,redirect_uri:location.origin+location.pathname,response_type:"token",scope:SCOPES,prompt:"select_account"});
  const popup=window.open("https://accounts.google.com/o/oauth2/v2/auth?"+params,"_blank","width=520,height=620");
  return new Promise((res,rej)=>{
    const t=setInterval(()=>{
      try{
        if(!popup||popup.closed){clearInterval(t);rej(new Error("fermé"));return;}
        const u=popup.location.href;
        if(u.includes("access_token")){clearInterval(t);popup.close();const h=new URLSearchParams(u.split("#")[1]);res(h.get("access_token"));}
      }catch(e){}
    },400);
  });
}
async function driveLoad(token){
  const r=await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27qualisilva-data.json%27&fields=files(id)",{headers:{Authorization:"Bearer "+token}});
  const j=await r.json();
  if(j.files&&j.files.length>0){
    S.fileId=j.files[0].id;
    const r2=await fetch("https://www.googleapis.com/drive/v3/files/"+S.fileId+"?alt=media",{headers:{Authorization:"Bearer "+token}});
    return await r2.json();
  }else{
    const data={entries:SEED,tags:S.tags};
    const meta=JSON.stringify({name:FILE_NAME,parents:["appDataFolder"]});
    const body=JSON.stringify(data);
    const form=new FormData();
    form.append("metadata",new Blob([meta],{type:"application/json"}));
    form.append("file",new Blob([body],{type:"application/json"}));
    const r2=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",{method:"POST",headers:{Authorization:"Bearer "+token},body:form});
    const j2=await r2.json();
    S.fileId=j2.id;
    return data;
  }
}

// ═══════════════════════════════════════════
// CALCUL DÉPLACEMENT (avec A/R)
// ═══════════════════════════════════════════
function depKmMontant(dep){
  if(!dep) return 0;
  const km = parseFloat(dep.km)||0;
  return km * TAUX_KM; // km déjà en A/R si la case est cochée (l'utilisateur saisit le total)
}
function depPreview(dep){
  if(!dep) return "";
  const km=parseFloat(dep.km)||0;
  const pe=parseFloat(dep.peage)||0;
  const kmM=km*TAUX_KM;
  const total=kmM+pe;
  if(km===0&&pe===0) return "";
  return `${km}\u00a0km × ${TAUX_KM}\u00a0€ = <strong>${fmt(kmM)}</strong>${pe>0?` · Péage\u00a0<strong>${fmt(pe)}</strong>`:""} &nbsp;→&nbsp; <strong>Total\u00a0: ${fmt(total)}</strong>`;
}

}

function renderJournal(st){

    .filter(e=>S.filterTag==="Tous"||e.tag===S.filterTag)
    .filter(e=>S.filterDos==="Tous"||e.dossier===S.filterDos)

  ${["Tous",...S.tags.map(t=>t.label)].map(t=>`<button class="fbtn${S.filterTag===t?" on":""}" style="${S.filterTag===t?"background:"+(t==="Tous"?"#4a7c59":tagCol(t))+";"  :""}" data-ftag="${t}">${t}</button>`).join("")}

        ${tR>0?`<div class="e-rec">📥 ${entry.recettes.map(r=>`${r.libelle} (${fmt(r.montant)})`).join(" · ")} <strong>= ${fmt(tR)}</strong></div>`:""}
        ${entry.remarque?`<div class="e-rem">💬 ${entry.remarque}</div>`:""}
      </div>

        <button class="be" data-edit="${entry.id}" title="Modifier">✏️</button>

// STATS
// ═══════════════════════════════════════════
function calcStats(){
  const th=S.entries.reduce((s,e)=>s+e.heures,0);
  const td=S.entries.reduce((s,e)=>s+totDep(e),0);
  const tr=S.entries.reduce((s,e)=>s+totRec(e),0);
  const parTag={};
  S.tags.forEach(t=>{const es=S.entries.filter(e=>e.tag===t.label);parTag[t.label]={h:es.reduce((s,e)=>s+e.heures,0),d:es.reduce((s,e)=>s+totDep(e),0),r:es.reduce((s,e)=>s+totRec(e),0),nb:es.length};});
  const parDos={};
  [...new Set(S.entries.map(e=>e.dossier||"—"))].forEach(d=>{const es=S.entries.filter(e=>(e.dossier||"—")===d);parDos[d]={h:es.reduce((s,e)=>s+e.heures,0),r:es.reduce((s,e)=>s+totRec(e),0),d:es.reduce((s,e)=>s+totDep(e),0)};});
  return {th,td,tr,solde:tr-td,tjm:th>0?tr/(th/8):0,parTag,parDos};
}

function updateDepPreview(){
  const km=parseFloat(document.getElementById("f-km")?.value)||0;
  const pe=parseFloat(document.getElementById("f-peage")?.value)||0;
  const ar=document.getElementById("f-ar")?.checked;
  const prev=document.getElementById("dep-prev");
  const lblKm=document.getElementById("lbl-km");
  if(lblKm) lblKm.textContent="Km totaux"+(ar?" (A/R)":"");
  if(prev){
    const kmM=km*TAUX_KM, total=kmM+pe;
    prev.innerHTML=(km>0||pe>0)?`${km}\u00a0km × ${TAUX_KM}\u00a0€ = <strong>${fmt(kmM)}</strong>${pe>0?` · Péage\u00a0<strong>${fmt(pe)}</strong>`:""} &nbsp;→&nbsp; <strong>Total\u00a0: ${fmt(total)}</strong>`:"";
  }
}

function readForm(){

function bindLogin(){
  document.getElementById("btn-signin").onclick=async()=>{
    try{
      document.getElementById("btn-signin").textContent="Connexion…";
      const token=await signIn();
      S.token=token;

      S.entries=data.entries||SEED;

  };
}

// ═══════════════════════════════════════════
// BIND EVENTS APP
// ═══════════════════════════════════════════
function bindApp(){
  const on=(id,ev,fn)=>{const el=document.getElementById(id);if(el)el[ev]=fn;};
  const all=(sel,fn)=>document.querySelectorAll(sel).forEach(fn);

  // Nav
  on("nav-journal","onclick",()=>{S.view="journal";render();});
  on("nav-analyse","onclick",()=>{S.view="analyse";render();});
  on("nav-tags",   "onclick",()=>{S.view="tags";render();});
  on("btn-new",    "onclick",()=>{
    S.form={date:new Date().toISOString().slice(0,10),description:"",tag:S.tags[0]?.label||"",dossier:"",heures:8,deplacement:null,depenses:[],recettes:[],remarque:""};
    S.showDep=false; S.editId=null; S.view="saisie"; render();
  });

  // Filtres journal
  all("[data-ftag]",b=>b.onclick=()=>{S.filterTag=b.dataset.ftag;render();});
  all("[data-fdos]",b=>b.onclick=()=>{S.filterDos=b.dataset.fdos;render();});

  // Actions entrées
  all("[data-edit]",b=>b.onclick=()=>{
    const e=S.entries.find(e=>e.id==b.dataset.edit);if(!e)return;
    S.form=JSON.parse(JSON.stringify(e)); S.showDep=!!e.deplacement; S.editId=e.id; S.view="saisie"; render();
  });
  all("[data-copy]",b=>b.onclick=()=>{
    const e=S.entries.find(e=>e.id==b.dataset.copy);if(!e)return;
    const copy=JSON.parse(JSON.stringify(e));
    copy.id=Date.now(); copy.date=new Date().toISOString().slice(0,10);
    S.entries.push(copy); scheduleSave(); render(); toast("📋 Entrée dupliquée");
  });
  all("[data-del]",b=>b.onclick=()=>{
    if(!confirm("Supprimer cette entrée ?"))return;
    S.entries=S.entries.filter(e=>e.id!=b.dataset.del); scheduleSave(); render(); toast("🗑 Supprimée");
  });

  // ── FORMULAIRE SAISIE ──
  if(S.view==="saisie"){
    on("btn-cancel","onclick",()=>{S.view="journal";render();});

    // Tag picker — SANS re-render, juste mise à jour visuelle
    all("[data-tag]",b=>b.onclick=()=>{
      S.form.tag=b.dataset.tag;
      document.querySelectorAll(".tp").forEach(tp=>{
        const t=S.tags.find(t=>t.label===tp.dataset.tag);
        const sel=tp.dataset.tag===S.form.tag;
        tp.className="tp"+(sel?" on":"");
        tp.style.background=sel?(t?.color||"#888"):"";
        tp.style.borderColor=sel?(t?.color||"#888"):"transparent";
      });
    });

    // Déplacement toggle — SANS re-render
    on("dep-toggle","onclick",()=>{
      S.showDep=!S.showDep;
      const tog=document.getElementById("dep-toggle");
      const inner=document.getElementById("dep-inner-wrap");
      if(S.showDep){
        if(!S.form.deplacement) S.form.deplacement={adresseDepart:ADRESSE,adresseArrivee:"",km:"",peage:"",allerRetour:true};
        tog.classList.add("open");
        tog.querySelector(".dep-ico").textContent="−";
        inner.style.display="";
        // Remplir les champs
        document.getElementById("f-dep-from").value=S.form.deplacement.adresseDepart||ADRESSE;
        document.getElementById("f-dep-to").value=S.form.deplacement.adresseArrivee||"";
        document.getElementById("f-km").value=S.form.deplacement.km||"";
        document.getElementById("f-peage").value=S.form.deplacement.peage||"";
        document.getElementById("f-ar").checked=S.form.deplacement.allerRetour!==false;
        bindDepFields();
      }else{
        S.form.deplacement=null;
        tog.classList.remove("open");
        tog.querySelector(".dep-ico").textContent="+";
        inner.style.display="none";
      }
    });

    // Champs déplacement (si déjà ouvert au chargement)
    if(S.showDep) bindDepFields();

    // Supprimer dépense
    all("[data-rmdep]",b=>b.onclick=()=>{
      S.form.depenses=S.form.depenses.filter((_,i)=>i!=b.dataset.rmdep);
      refreshDepList();
    });

    // Ajouter dépense
    on("btn-adddep","onclick",()=>{
      const lbl=(document.getElementById("nd-lbl")?.value||"").trim();
      const amt=parseFloat(document.getElementById("nd-amt")?.value);
      if(!lbl||isNaN(amt)||amt<=0)return;
      S.form.depenses.push({libelle:lbl,montant:amt});
      document.getElementById("nd-lbl").value="";
      document.getElementById("nd-amt").value="";
      refreshDepList();
    });

    // Supprimer recette
    all("[data-rmrec]",b=>b.onclick=()=>{
      S.form.recettes=S.form.recettes.filter((_,i)=>i!=b.dataset.rmrec);
      refreshRecList();
    });

    // Ajouter recette
    on("btn-addrec","onclick",()=>{
      const lbl=(document.getElementById("nr-lbl")?.value||"").trim();
      const amt=parseFloat(document.getElementById("nr-amt")?.value);
      if(!lbl||isNaN(amt)||amt<=0)return;
      S.form.recettes.push({libelle:lbl,montant:amt});
      document.getElementById("nr-lbl").value="";
      document.getElementById("nr-amt").value="";
      refreshRecList();
    });

    // Save
    on("btn-save","onclick",()=>{
      const f=readForm();
      if(!f.description.trim()){alert("Merci d'ajouter une description.");return;}
      if(!f.tag){alert("Merci de sélectionner un type d'activité.");return;}
      if(S.editId) S.entries=S.entries.map(e=>e.id===S.editId?{...f,id:S.editId}:e);
      else S.entries.push({...f,id:Date.now()});
      scheduleSave(); S.view="journal"; S.editId=null;
      render(); toast(S.editId?"✓ Modifié":"✓ Entrée ajoutée");
    });
  }

  // ── TAGS EDITOR ──
  all("[data-editte]",b=>b.onclick=()=>{S.editTagI=parseInt(b.dataset.editte);S.editTagV=S.tags[S.editTagI].label;render();setTimeout(()=>document.getElementById("te-inp")?.focus(),50);});
  all("[data-savete]",b=>b.onclick=()=>{
    const idx=parseInt(b.dataset.savete);
    const nl=(document.getElementById("te-inp")?.value||"").trim();if(!nl)return;
    const ol=S.tags[idx].label;
    S.tags[idx].label=nl;
    S.entries=S.entries.map(e=>e.tag===ol?{...e,tag:nl}:e);
    S.editTagI=null;scheduleSave();render();toast("Tag renommé");
  });
  on("btn-cante","onclick",()=>{S.editTagI=null;render();});
  all("[data-delte]",b=>b.onclick=()=>{
    const idx=parseInt(b.dataset.delte),lbl=S.tags[idx].label;
    if(S.entries.some(e=>e.tag===lbl)&&!confirm(`Le tag "${lbl}" est utilisé. Supprimer quand même ?`))return;
    S.tags=S.tags.filter((_,i)=>i!==idx);scheduleSave();render();toast("Tag supprimé");
  });
  all("[data-setcol]",d=>d.onclick=()=>{S.tags[parseInt(d.dataset.setcol)].color=d.dataset.col;scheduleSave();render();});
  all("[data-newcol]",d=>d.onclick=()=>{S.newTagCol=d.dataset.newcol;render();});
  on("btn-addtag","onclick",()=>{
    const l=(document.getElementById("nt-lbl")?.value||"").trim();
    if(!l||S.tags.find(t=>t.label===l)){alert("Nom vide ou déjà existant.");return;}
    S.tags.push({label:l,color:S.newTagCol});
    S.newTagLbl="";scheduleSave();render();toast("Tag ajouté");
  });
}

// Bind les champs déplacement (live update sans re-render)
function bindDepFields(){
  ["f-km","f-peage","f-ar"].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.oninput=el.onchange=updateDepPreview;
  });
}

// Rafraîchir juste la liste des dépenses (sans toucher au reste)
function refreshDepList(){
  const el=document.getElementById("dep-list");
  if(!el)return;
  el.innerHTML=S.form.depenses.map((d,i)=>`<div class="li li-d"><span class="li-lbl">${d.libelle}</span><span class="li-amt" style="color:#c0392b">${fmt(d.montant)}</span><button type="button" class="li-rm" data-rmdep="${i}">×</button></div>`).join("");
  document.querySelectorAll("[data-rmdep]").forEach(b=>b.onclick=()=>{S.form.depenses=S.form.depenses.filter((_,i)=>i!=b.dataset.rmdep);refreshDepList();});
}

function refreshRecList(){
  const el=document.getElementById("rec-list");
  if(!el)return;
  el.innerHTML=S.form.recettes.map((r,i)=>`<div class="li li-r"><span class="li-lbl">${r.libelle}</span><span class="li-amt" style="color:#27ae60">${fmt(r.montant)}</span><button type="button" class="li-rm" data-rmrec="${i}">×</button></div>`).join("");
  document.querySelectorAll("[data-rmrec]").forEach(b=>b.onclick=()=>{S.form.recettes=S.form.recettes.filter((_,i)=>i!=b.dataset.rmrec);refreshRecList();});
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
render();
</script>
