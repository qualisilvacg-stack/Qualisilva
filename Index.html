// ══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════════════════
const calcKm    = d => d ? (d.km||0)*TAUX_KM : 0;
const calcPeage = d => d ? (d.peage||0) : 0;
const totDep    = e => e.depenses.reduce((s,d)=>s+d.montant,0) + calcKm(e.deplacement) + calcPeage(e.deplacement);

// ══════════════════════════════════════════════════════════════════════════════
// GOOGLE DRIVE API
// ══════════════════════════════════════════════════════════════════════════════
let gAccessToken = null;
let gFileId = null;

function loadGapi() {
  return new Promise(res => {
    if (window.gapi) { res(); return; }
    const s = document.createElement("script");
    s.src = "https://apis.google.com/js/api.js";
    s.onload = () => gapi.load("client", res);
    document.head.appendChild(s);
  });
}

async function signIn() {
  await loadGapi();
  await gapi.client.init({ discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] });

  return new Promise((resolve, reject) => {
    const params = new URLSearchParams({
      client_id: CLIENT_ID,
      redirect_uri: window.location.origin + window.location.pathname,
      response_type: "token",
      scope: SCOPES,
      prompt: "select_account"
    });
    const popup = window.open(
      "https://accounts.google.com/o/oauth2/v2/auth?" + params,
      "google-signin", "width=500,height=600,menubar=no,toolbar=no"
    );
    const check = setInterval(() => {
      try {
        if (!popup || popup.closed) { clearInterval(check); reject(new Error("Fenêtre fermée")); return; }
        const url = popup.location.href;
        if (url.includes("access_token")) {
          clearInterval(check);
          popup.close();
          const hash = new URLSearchParams(url.split("#")[1]);
          gAccessToken = hash.get("access_token");
          gapi.client.setToken({ access_token: gAccessToken });
          resolve(gAccessToken);
        }
      } catch(e) { /* cross-origin, on attend */ }
    }, 300);
  });
}

async function driveReadOrCreate(defaultData) {
  // Cherche le fichier dans appDataFolder
  const list = await gapi.client.drive.files.list({
    spaces: "appDataFolder",
    q: `name='${FILE_NAME}'`,
    fields: "files(id,name)"
  });
  const files = list.result.files;
  if (files.length > 0) {
    gFileId = files[0].id;
    // Lit le contenu
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${gFileId}?alt=media`, {
      headers: { Authorization: "Bearer " + gAccessToken }
    });
    return await res.json();
  } else {
    // Crée le fichier avec les données par défaut
    const meta = { name: FILE_NAME, parents: ["appDataFolder"] };
    const body = JSON.stringify(defaultData);
    const form = new FormData();
    form.append("metadata", new Blob([JSON.stringify(meta)], {type:"application/json"}));
    form.append("file", new Blob([body], {type:"application/json"}));
    const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id", {
      method: "POST", headers: { Authorization: "Bearer " + gAccessToken }, body: form
    });
    const data = await res.json();
    gFileId = data.id;
    return defaultData;
  }
}

async function driveSave(data) {
  if (!gFileId || !gAccessToken) return;
  await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gFileId}?uploadType=media`, {
    method: "PATCH",
    headers: { Authorization: "Bearer " + gAccessToken, "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
}

// ── Debounce save ─────────────────────────────────────────────────────────────
function useAutoSave(entries, tags, ready) {
  const timer = useRef(null);
  const syncState = useRef("ok"); // ok | pending | error
  const [syncStatus, setSyncStatus] = useState("ok");

  const save = useCallback(async (e, t) => {
    if (!ready) return;
    setSyncStatus("pending");
    syncState.current = "pending";
    try {
      await driveSave({entries:e, tags:t});
      setSyncStatus("ok");
      syncState.current = "ok";
    } catch(err) {
      setSyncStatus("error");
      syncState.current = "error";
    }
  }, [ready]);

  useEffect(() => {
    if (!ready) return;
    clearTimeout(timer.current);
    timer.current = setTimeout(() => save(entries, tags), 1500);
    return () => clearTimeout(timer.current);
  }, [entries, tags, ready, save]);

  return syncStatus;
}

  const [driveReady,setDriveReady]= useState(false);
  const [view,      setView]      = useState("journal");
  const [editingId, setEditingId] = useState(null);
  const [form,      setForm]      = useState({...EMPTY_FORM});
  const [showDep,   setShowDep]   = useState(false);
  const [newDep,    setNewDep]    = useState({libelle:"",montant:""});
  const [newRec,    setNewRec]    = useState({libelle:"",montant:""});
  const [filterTag, setFilterTag] = useState("Tous");
  const [filterDos, setFilterDos] = useState("Tous");
  const [newTagLbl, setNewTagLbl] = useState("");
  const [newTagCol, setNewTagCol] = useState(PALETTE[0]);
  const [editTagI,  setEditTagI]  = useState(null);
  const [editTagV,  setEditTagV]  = useState("");

  const syncStatus = useAutoSave(entries, tags, driveReady);

  // ── Connexion Google ────────────────────────────────────────────────────────
  async function handleSignIn() {
    try {
      setScreen("loading");
      await signIn();
      const defaultData = {entries: SEED_ENTRIES, tags: DEFAULT_TAGS};
      const data = await driveReadOrCreate(defaultData);
      setEntries(data.entries || SEED_ENTRIES);
      setTags(data.tags || DEFAULT_TAGS);
      setDriveReady(true);
      setScreen("app");
      showToast("✓ Connecté à Google Drive");
    } catch(err) {
      setScreen("login");
      showToast("⚠ Connexion annulée");
    }
  }

  // ── Dérivés ─────────────────────────────────────────────────────────────────
  const dossiers = useMemo(() => ["Tous",...[...new Set(entries.map(e=>e.dossier).filter(Boolean))]], [entries]);

  const filtered = useMemo(() =>
    entries
      .filter(e => filterTag==="Tous" || e.tag===filterTag)
      .filter(e => filterDos==="Tous" || e.dossier===filterDos)
      .sort((a,b) => b.date.localeCompare(a.date)),
    [entries, filterTag, filterDos]);

  const stats = useMemo(() => {
    const th = entries.reduce((s,e)=>s+e.heures,0);
    const td = entries.reduce((s,e)=>s+totDep(e),0);
    const tr = entries.reduce((s,e)=>s+totRec(e),0);
    const parTag = {};
    tags.forEach(t => {
      const es = entries.filter(e=>e.tag===t.label);
      parTag[t.label] = {h:es.reduce((s,e)=>s+e.heures,0), d:es.reduce((s,e)=>s+totDep(e),0), r:es.reduce((s,e)=>s+totRec(e),0), nb:es.length};
    });
    const parDos = {};
    [...new Set(entries.map(e=>e.dossier||"—"))].forEach(d => {
      const es = entries.filter(e=>(e.dossier||"—")===d);
      parDos[d] = {h:es.reduce((s,e)=>s+e.heures,0), r:es.reduce((s,e)=>s+totRec(e),0), d:es.reduce((s,e)=>s+totDep(e),0)};
    });
    return {th, td, tr, solde:tr-td, tjm:th>0?tr/(th/8):0, parTag, parDos};
  }, [entries, tags]);

  // ── Saisie ───────────────────────────────────────────────────────────────────
  const startNew = () => {
    setForm({...EMPTY_FORM, date:new Date().toISOString().slice(0,10), tag:tags[0]?.label||""});
    setShowDep(false); setEditingId(null); setView("saisie");
  };
  const startEdit = entry => {
    setForm({...entry}); setShowDep(!!entry.deplacement); setEditingId(entry.id); setView("saisie");
  };
  const saveForm = () => {
    const f = {...form, deplacement: showDep && form.deplacement
      ? {...form.deplacement, km:parseFloat(form.deplacement.km)||0, peage:parseFloat(form.deplacement.peage)||0}
      : null};
    if (editingId!==null) setEntries(entries.map(e=>e.id===editingId?{...f,id:editingId}:e));
    else setEntries([...entries,{...f,id:Date.now()}]);
    setView("journal"); setEditingId(null);
    showToast("✓ Entrée enregistrée");
  };
  const deleteEntry = id => {
    if (!window.confirm("Supprimer cette entrée ?")) return;
    setEntries(entries.filter(e=>e.id!==id));
    showToast("Entrée supprimée");
  };
  const addDL = () => { if(!newDep.libelle||!newDep.montant) return; setForm({...form,depenses:[...form.depenses,{libelle:newDep.libelle,montant:parseFloat(newDep.montant)}]}); setNewDep({libelle:"",montant:""}); };
  const addRL = () => { if(!newRec.libelle||!newRec.montant) return; setForm({...form,recettes:[...form.recettes,{libelle:newRec.libelle,montant:parseFloat(newRec.montant)}]}); setNewRec({libelle:"",montant:""}); };
  const kmPrev    = showDep && form.deplacement ? (parseFloat(form.deplacement.km)||0)*TAUX_KM : 0;
  const peagePrev = showDep && form.deplacement ? parseFloat(form.deplacement.peage)||0 : 0;

  // ── Tags ─────────────────────────────────────────────────────────────────────
  const addTag = () => {
    const l = newTagLbl.trim();
    if (!l || tags.find(t=>t.label===l)) return;
    setTags([...tags,{label:l,color:newTagCol}]);
    setNewTagLbl(""); setNewTagCol(PALETTE[0]);
    showToast("Tag ajouté");
  };
  const deleteTag = idx => {
    const lbl = tags[idx].label;
    if (entries.some(e=>e.tag===lbl) && !window.confirm(`Le tag "${lbl}" est utilisé. Supprimer quand même ?`)) return;
    setTags(tags.filter((_,i)=>i!==idx));
  };
  const saveEditTag = idx => {
    const nl = editTagV.trim(); if(!nl) return;
    const ol = tags[idx].label;
    setTags(tags.map((t,i)=>i===idx?{...t,label:nl}:t));
    setEntries(entries.map(e=>e.tag===ol?{...e,tag:nl}:e));
    setEditTagI(null); setEditTagV("");
  };
  const updateTagCol = (idx,c) => setTags(tags.map((t,i)=>i===idx?{...t,color:c}:t));

  const BAR_MAX = Math.max(...Object.values(stats.parTag).map(t=>t.h), 1);

  // ══════════════════════════════════════════════════════════════════════════
  // RENDU
  // ══════════════════════════════════════════════════════════════════════════

  // ── Écran Login ──
  if (screen==="login") return h("div",{className:"login-screen"},
    h("div",{className:"login-logo"},"🌲"),
    h("div",{className:"login-title"},"QUALISILVA"),
    h("div",{className:"login-sub"},"Suivi d'activité sylvicole. Vos données sont synchronisées sur votre Google Drive personnel."),
    h("button",{className:"btn-google",onClick:handleSignIn},
      h("svg",{viewBox:"0 0 48 48"},
        h("path",{fill:"#EA4335",d:"M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"}),
        h("path",{fill:"#4285F4",d:"M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"}),
        h("path",{fill:"#FBBC05",d:"M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"}),
        h("path",{fill:"#34A853",d:"M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"}),
        h("path",{fill:"none",d:"M0 0h48v48H0z"})
      ),
      "Se connecter avec Google"
    ),
    h("div",{className:"login-note"},"Qualisilva utilise uniquement le dossier privé \"appData\" de votre Drive. Aucune autre application ne peut y accéder.")
  );

  // ── Chargement ──
  if (screen==="loading") return h("div",{className:"login-screen"},
    h("div",{className:"login-logo"},"🌲"),
    h("div",{className:"login-title"},"QUALISILVA"),
    h("div",{style:{color:"#666",fontSize:14}},"Connexion en cours…")
  );

  // ── App ──
  const syncDot = h("span",{className:`sync-dot ${syncStatus}`,title:{ok:"Synchronisé",pending:"Sauvegarde…",error:"Erreur de sync"}[syncStatus]});

  return h("div",{className:"app"},

    // Header
    h("div",{className:"hdr"},
      h("div",{className:"hdr-row"},
        h("div",{className:"logo"},"🌲 Qualisilva ", syncDot),
        h("button",{className:"btn-saisir",onClick:startNew},"+ Saisir")
      ),
      h("div",{className:"kpis"},
        ...[["Recettes",fmt(stats.tr),"#5fb87a"],["Dépenses",fmt(stats.td),"#e07070"],
            ["Solde",fmt(stats.solde),stats.solde>=0?"#5fb87a":"#e07070"],
            ["TJM",stats.th>0?fmt(stats.tjm).replace("\u00a0€","")+"\u00a0€/j":"—","#c8b46a"]]
          .map(([l,v,c],i)=>h("div",{key:i,className:"kpi"},
            h("div",{className:"kpi-l"},l),
            h("div",{className:"kpi-v",style:{color:c}},v)
          ))
      )
    ),

    // Main
    h("div",{className:"main"},

      // ════ JOURNAL ════
      view==="journal" && h("div",null,
        h("div",{className:"f-scroll"},
          ["Tous",...tags.map(t=>t.label)].map(t=>
            h("button",{key:t,className:"f-btn"+(filterTag===t?" active":""),
              style:{background:filterTag===t&&t!=="Tous"?tagCol(tags,t):filterTag===t?"#4a7c59":undefined},
              onClick:()=>setFilterTag(t)},t)
          )
        ),
        dossiers.length>2 && h("div",{className:"f-scroll"},
          dossiers.map(d=>h("button",{key:d,className:"f-btn"+(filterDos===d?" active":""),
            style:{background:filterDos===d?"#2d5a27":undefined},
            onClick:()=>setFilterDos(d)},d))
        ),
        filtered.length===0 && h("div",{className:"empty"},"Aucune entrée"),
        filtered.map(entry=>{
          const km=calcKm(entry.deplacement), pe=calcPeage(entry.deplacement);
          const tR=totRec(entry), tD=totDep(entry);
          const col=tagCol(tags,entry.tag);
          return h("div",{key:entry.id,className:"entry"},
            h("div",{className:"e-band",style:{background:col}}),
            h("div",{className:"e-body"},
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
                h("div",{style:{flex:1,minWidth:0}},
                  h("div",{className:"e-meta"},
                    h("span",{className:"e-date"},fmtD(entry.date)),
                    h("span",{className:"badge",style:{background:col}},entry.tag),
                    entry.dossier&&h("span",{className:"badge-dos"},entry.dossier),
                    h("span",{style:{fontSize:11,color:"#999"}},entry.heures+"h")
                  ),
                  h("div",{className:"e-desc"},entry.description),
                  tD>0&&h("div",{className:"e-dep"},
                    "📤 ",
                    entry.depenses.map(d=>`${d.libelle} (${fmt(d.montant)})`).join(" · "),
                    entry.depenses.length>0&&km>0?" · ":"",
                    km>0&&`Km A/R ${entry.deplacement.km} km (${fmt(km)})`,
                    pe>0&&` · Péage (${fmt(pe)})`,
                    " ",h("strong",null,"= "+fmt(tD))
                  ),
                  tR>0&&h("div",{className:"e-rec"},
                    "📥 ",entry.recettes.map(r=>`${r.libelle} (${fmt(r.montant)})`).join(" · "),
                    " ",h("strong",null,"= "+fmt(tR))
                  ),
                  entry.remarque&&h("div",{className:"e-rem"},"💬 "+entry.remarque)
                ),
                h("div",{className:"e-acts"},
                  h("button",{className:"be",onClick:()=>startEdit(entry)},"✏️"),
                  h("button",{className:"bd",onClick:()=>deleteEntry(entry.id)},"🗑")
                )
              )
            )
          );
        })
      ),

      // ════ SAISIE ════
      view==="saisie" && h("div",{className:"form-card"},
        h("div",{className:"form-title"},
          h("h3",null,editingId?"✏️ Modifier":"✚ Nouvelle entrée"),
          h("button",{className:"f-close",onClick:()=>setView("journal")},"×")
        ),
        h("div",{className:"g2"},
          h("div",null,h("label",{className:"lbl"},"Date"),h("input",{type:"date",className:"inp",value:form.date,onChange:ev=>setForm({...form,date:ev.target.value})})),
          h("div",null,h("label",{className:"lbl"},"Heures"),h("input",{type:"number",className:"inp",min:.5,max:24,step:.5,value:form.heures,onChange:ev=>setForm({...form,heures:parseFloat(ev.target.value)})}))
        ),
        h("div",{className:"fg"},h("label",{className:"lbl"},"Description"),h("textarea",{className:"inp",rows:3,placeholder:"Ce que tu as fait…",value:form.description,onChange:ev=>setForm({...form,description:ev.target.value})})),
        h("div",{className:"fg"},
          h("label",{className:"lbl"},"Type d'activité"),
          h("div",{className:"tag-picker"},
            tags.map(t=>h("button",{key:t.label,className:"tp-btn"+(form.tag===t.label?" sel":""),
              style:{background:form.tag===t.label?t.color:undefined,borderColor:form.tag===t.label?t.color:"transparent"},
              onClick:()=>setForm({...form,tag:t.label})},t.label))
          )
        ),
        h("div",{className:"fg"},
          h("label",{className:"lbl"},"Dossier / Client"),
          h("input",{type:"text",className:"inp",placeholder:"Ex : Brissac",value:form.dossier,list:"dos-list",onChange:ev=>setForm({...form,dossier:ev.target.value})}),
          h("datalist",{id:"dos-list"},...[...new Set(entries.map(e=>e.dossier).filter(Boolean))].map(d=>h("option",{key:d,value:d})))
        ),

        // Déplacement
        h("div",{className:"dep-blk"},
          h("div",{className:"dep-tog"+(showDep?" open":""),onClick:()=>{
            const n=!showDep; setShowDep(n);
            if(n&&!form.deplacement) setForm({...form,deplacement:{...EMPTY_DEP}});
            if(!n) setForm({...form,deplacement:null});
          }},
            h("span",{className:"dep-tog-lbl"},"🚗 Frais de déplacement"),
            h("span",{className:"dep-tog-ico"},showDep?"−":"+")
          ),
          showDep&&form.deplacement&&h("div",{className:"dep-inner"},
            h("div",null,h("label",{className:"lbl"},"Départ"),h("input",{type:"text",className:"inp",value:form.deplacement.adresseDepart,onChange:ev=>setForm({...form,deplacement:{...form.deplacement,adresseDepart:ev.target.value}})})),
            h("div",null,h("label",{className:"lbl"},"Arrivée"),h("input",{type:"text",className:"inp",placeholder:"Ex : Brissac-Quinié, 49",value:form.deplacement.adresseArrivee,onChange:ev=>setForm({...form,deplacement:{...form.deplacement,adresseArrivee:ev.target.value}})})),
            h("div",{className:"g2",style:{marginBottom:0}},
              h("div",null,h("label",{className:"lbl"},"Km "+(form.deplacement.allerRetour?"(A/R total)":"(aller)")),h("input",{type:"number",className:"inp",inputMode:"decimal",min:0,step:1,placeholder:"84",value:form.deplacement.km,onChange:ev=>setForm({...form,deplacement:{...form.deplacement,km:ev.target.value}})})),
              h("div",null,h("label",{className:"lbl"},"Péage (€)"),h("input",{type:"number",className:"inp",inputMode:"decimal",min:0,step:.5,placeholder:"0",value:form.deplacement.peage,onChange:ev=>setForm({...form,deplacement:{...form.deplacement,peage:ev.target.value}})}))
            ),
            h("label",{className:"dep-check"},h("input",{type:"checkbox",checked:form.deplacement.allerRetour,onChange:ev=>setForm({...form,deplacement:{...form.deplacement,allerRetour:ev.target.checked}})}), "Aller-retour"),
            parseFloat(form.deplacement.km)>0&&h("div",{className:"dep-preview"},
              `${form.deplacement.km} km × ${TAUX_KM}\u00a0€ = `,h("strong",null,fmt(kmPrev)),
              peagePrev>0&&[" · Péage : ",h("strong",null,fmt(peagePrev))],
              h("strong",null,` → Total : ${fmt(kmPrev+peagePrev)}`)
            )
          )
        ),

        // Dépenses
        h("div",{className:"fg"},
          h("label",{className:"lbl lbl-r"},"📤 Autres dépenses"),
          h("div",{className:"ll"},form.depenses.map((d,i)=>h("div",{key:i,className:"li li-d"},
            h("span",{className:"li-lbl"},d.libelle),
            h("span",{className:"li-amt",style:{color:"#c0392b"}},fmt(d.montant)),
            h("button",{className:"li-rm",style:{color:"#e07070"},onClick:()=>setForm({...form,depenses:form.depenses.filter((_,j)=>j!==i)})},"×")
          ))),
          h("div",{className:"la"},
            h("input",{type:"text",className:"inp",style:{flex:1},placeholder:"Libellé",value:newDep.libelle,onChange:ev=>setNewDep({...newDep,libelle:ev.target.value})}),
            h("input",{type:"number",className:"inp",style:{width:70},inputMode:"decimal",placeholder:"€",value:newDep.montant,onChange:ev=>setNewDep({...newDep,montant:ev.target.value})}),
            h("button",{className:"btn-ad",onClick:addDL},"+")
          )
        ),

        // Recettes
        h("div",{className:"fg"},
          h("label",{className:"lbl lbl-g"},"📥 Recettes"),
          h("div",{className:"ll"},form.recettes.map((r,i)=>h("div",{key:i,className:"li li-r"},
            h("span",{className:"li-lbl"},r.libelle),
            h("span",{className:"li-amt",style:{color:"#27ae60"}},fmt(r.montant)),
            h("button",{className:"li-rm",style:{color:"#70c070"},onClick:()=>setForm({...form,recettes:form.recettes.filter((_,j)=>j!==i)})},"×")
          ))),
          h("div",{className:"la"},
            h("input",{type:"text",className:"inp",style:{flex:1},placeholder:"Libellé",value:newRec.libelle,onChange:ev=>setNewRec({...newRec,libelle:ev.target.value})}),
            h("input",{type:"number",className:"inp",style:{width:70},inputMode:"decimal",placeholder:"€",value:newRec.montant,onChange:ev=>setNewRec({...newRec,montant:ev.target.value})}),
            h("button",{className:"btn-ar",onClick:addRL},"+")
          )
        ),

        h("div",{className:"fg"},
          h("label",{className:"lbl"},"Remarque"),
          h("textarea",{className:"inp",rows:2,placeholder:"Notes…",value:form.remarque,onChange:ev=>setForm({...form,remarque:ev.target.value})})
        ),
        h("button",{className:"btn-save",onClick:saveForm},editingId?"💾 Enregistrer les modifications":"✚ Ajouter l'entrée")
      ),

      // ════ ANALYSES ════
      view==="analyse" && h("div",null,
        h("div",{className:"card"},
          h("div",{className:"card-hdr"},h("h3",null,"Répartition par activité")),
          h("div",{className:"card-body"},
            tags.filter(t=>stats.parTag[t.label]?.nb>0).map(t=>{
              const d=stats.parTag[t.label];
              return h("div",{key:t.label,className:"bar-row"},
                h("div",{className:"bar-lbl"},
                  h("span",{className:"bar-lbl-name",style:{color:t.color}},t.label),
                  h("span",{style:{color:"#888",fontSize:11}},`${d.h}h · ${fmt(d.r)}`)
                ),
                h("div",{className:"bar-track"},h("div",{className:"bar-fill",style:{width:`${Math.round(d.h/BAR_MAX*100)}%`,background:t.color}}))
              );
            })
          )
        ),
        h("div",{className:"card"},
          h("div",{className:"card-hdr",style:{borderColor:"#8b6914"}},h("h3",null,"Rentabilité par dossier")),
          h("div",{className:"tbl-wrap"},
            h("table",null,
              h("thead",null,h("tr",null,...["Dossier","h","Rec.","Dép.","Solde","TJM"].map((c,i)=>h("th",{key:i,style:{textAlign:i===0?"left":"right"}},c)))),
              h("tbody",null,...Object.entries(stats.parDos).map(([d,s])=>{
                const sol=s.r-s.d, tjm=s.h>0?s.r/(s.h/8):0;
                return h("tr",{key:d},
                  h("td",{style:{fontWeight:"bold"}},d),
                  h("td",{style:{textAlign:"right"}},s.h),
                  h("td",{style:{textAlign:"right",color:"#27ae60"}},fmt(s.r)),
                  h("td",{style:{textAlign:"right",color:"#c0392b"}},fmt(s.d)),
                  h("td",{style:{textAlign:"right",fontWeight:"bold",color:sol>=0?"#27ae60":"#c0392b"}},fmt(sol)),
                  h("td",{style:{textAlign:"right"}},s.h>0?fmt(tjm)+"/j":"—")
                );
              }))
            )
          )
        ),
        h("div",{className:"card"},
          h("div",{className:"card-hdr",style:{borderColor:"#5c7a8a"}},h("h3",null,"Temps non facturé")),
          h("div",{className:"card-body"},
            (()=>{
              const nf=entries.filter(e=>totRec(e)===0);
              const hNF=nf.reduce((s,e)=>s+e.heures,0);
              return h("div",null,
                h("div",{className:"nf-row"},
                  h("div",{className:"nf-box blue"},h("div",{style:{fontSize:24,fontWeight:"bold",color:"#5c7a8a"}},hNF+"h"),h("div",{style:{fontSize:10,color:"#888",marginTop:2}},"non facturées")),
                  h("div",{className:"nf-box gold"},h("div",{style:{fontSize:18,fontWeight:"bold",color:"#8b6914"}},fmt((hNF/8)*550)),h("div",{style:{fontSize:10,color:"#888",marginTop:2}},"valeur est. (550€/j)"))
                ),
                ...nf.map(e=>h("div",{key:e.id,style:{fontSize:12,padding:"4px 0",borderBottom:"1px solid #eee",color:"#555"}},
                  `${fmtD(e.date)} — ${e.description} `,h("span",{style:{color:"#aaa"}},"("+e.heures+"h)")
                ))
              );
            })()
          )
        )
      ),

      // ════ TAGS ════
      view==="tags" && h("div",null,
        h("div",{className:"card"},
          h("div",{className:"card-hdr",style:{borderColor:"#7a5c8a"}},h("h3",null,"🏷 Mes tags")),
          h("div",{className:"card-body",style:{paddingTop:10}},
            tags.map((t,idx)=>h("div",{key:t.label,className:"te-item"},
              editTagI===idx
                ? h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
                    h("input",{className:"te-inp",autoFocus:true,value:editTagV,
                      onChange:ev=>setEditTagV(ev.target.value),
                      onKeyDown:ev=>ev.key==="Enter"&&saveEditTag(idx)}),
                    h("button",{className:"btn-ok",onClick:()=>saveEditTag(idx)},"OK"),
                    h("button",{className:"btn-can",onClick:()=>setEditTagI(null)},"×")
                  )
                : h("div",{className:"te-row"},
                    h("div",{className:"te-dot",style:{background:t.color}}),
                    h("span",{className:"te-name"},t.label),
                    h("span",{className:"te-cnt"},(stats.parTag[t.label]?.nb||0)+" entrée"+(stats.parTag[t.label]?.nb!==1?"s":"")),
                    h("button",{className:"btn-te",onClick:()=>{setEditTagI(idx);setEditTagV(t.label);}},"✏️"),
                    h("button",{className:"btn-td",onClick:()=>deleteTag(idx)},"🗑")
                  ),
              h("div",{className:"palette"},
                PALETTE.map(c=>h("div",{key:c,className:"pal-dot"+(t.color===c?" sel":""),style:{background:c},onClick:()=>updateTagCol(idx,c)}))
              )
            ))
          )
        ),
        h("div",{className:"card"},
          h("div",{className:"card-hdr",style:{borderColor:"#7a5c8a"}},h("h3",null,"+ Nouveau tag")),
          h("div",{className:"card-body",style:{display:"flex",flexDirection:"column",gap:12}},
            h("div",null,h("label",{className:"lbl"},"Nom"),h("input",{type:"text",className:"inp",placeholder:"Ex : Expertise, Vente de bois…",value:newTagLbl,onChange:ev=>setNewTagLbl(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&addTag()})),
            h("div",null,
              h("label",{className:"lbl"},"Couleur"),
              h("div",{className:"palette",style:{gap:12}},
                PALETTE.map(c=>h("div",{key:c,className:"pal-dot"+(newTagCol===c?" sel":""),style:{background:c,width:30,height:30},onClick:()=>setNewTagCol(c)}))
              )
            ),
            h("div",{style:{display:"flex",gap:10,alignItems:"center"}},
              h("div",{style:{width:34,height:34,borderRadius:"50%",background:newTagCol,border:"2px solid rgba(0,0,0,.1)",flexShrink:0}}),
              h("span",{style:{fontSize:15,fontWeight:"bold",color:newTagCol}},newTagLbl||"Aperçu")
            ),
            h("button",{className:"btn-addtag",onClick:addTag},"Ajouter ce tag")
          )
        )
      )

    ), // fin main

    // Nav bottom
    h("div",{className:"nav"},
      ...[["journal","📋","Journal"],["analyse","📊","Analyses"],["tags","🏷","Tags"]].map(([v,icon,lbl])=>
        h("button",{key:v,className:"nav-b"+(view===v?" active":""),onClick:()=>setView(v)},
          h("span",{className:"nav-icon"},icon), lbl)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
